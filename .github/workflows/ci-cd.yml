name: StudyHub CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────
# GitHub Secrets needed (Settings → Secrets → Actions):
#
#   VERCEL_TOKEN         — Vercel account token (vercel.com → Account → Tokens)
#   VERCEL_ORG_ID        — team_EzhQpcOy4ZmY01mbO9UE7SHu
#
# Frontend (studyhub-app — deploys from root):
#   VERCEL_PROJECT_ID_FRONTEND  — prj_8EUYLQVn9whPJtCd8u3upVHg4rum
#   VITE_API_URL                — https://studyhub-api-delta.vercel.app/api
#
# Backend API (studyhub-api — deploys from backend/):
#   VERCEL_PROJECT_ID_BACKEND   — prj_7XZ1Fq2ot3FmWLRivg26XAqOnEc8
#   SUPABASE_URL                — https://yzryikhmjbvzhrxlnjwx.supabase.co
#   SUPABASE_ANON_KEY           — (from Supabase dashboard)
#   SUPABASE_SERVICE_ROLE_KEY   — (from Supabase dashboard)
#   JWT_SECRET                  — (min 32 chars random string)
# ─────────────────────────────────────────────────────────────

jobs:

  # ── 1. Build & lint frontend ────────────────────────────────
  frontend-build:
    name: Frontend — Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint --if-present
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://studyhub-api-delta.vercel.app/api' }}
          VITE_WS_URL:  ''

  # ── 2. Backend syntax check ─────────────────────────────────
  backend-check:
    name: Backend — Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Syntax check
        run: node --check src/app.js
        working-directory: backend

  # ── 3. Deploy Frontend → Vercel (studyhub-app) ─────────────
  deploy-frontend:
    name: Deploy Frontend → studyhub-app.vercel.app
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://studyhub-app.vercel.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env & project info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
          VITE_API_URL:      ${{ secrets.VITE_API_URL || 'https://studyhub-api-delta.vercel.app/api' }}
          VITE_WS_URL:       ''

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

  # ── 4. Deploy Backend → Vercel (studyhub-api) ──────────────
  deploy-backend:
    name: Deploy Backend → studyhub-api-delta.vercel.app
    runs-on: ubuntu-latest
    needs: [backend-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://studyhub-api-delta.vercel.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env & project info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: backend
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: backend
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: backend
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
